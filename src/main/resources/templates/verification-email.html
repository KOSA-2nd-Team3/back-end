<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>이메일 인증</title>
</head>
<body style="margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f0f0; height: 100vh; display: flex; justify-content: center; align-items: center; color: #333;">
<div class="card" style="background-color: white; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); padding: 40px 50px; max-width: 400px; text-align: center;">
    <h2 style="margin-bottom: 20px; font-size: 24px; color: #222;">이메일 인증을 완료하려면<br/>아래 버튼을 클릭하세요.</h2>
    <p style="font-size: 16px; color: #555; line-height: 1.5; margin-bottom: 30px;">회원가입을 완료하기 위해서는 이메일 인증이 필요합니다.<br/>
        이메일로 발송된 인증 메일을 확인해 주세요.</p>
    <a class="verify-button"
       th:href="${verificationLink}"
       style="display: inline-block; background-color: #4caf50; color: white; font-weight: 600; font-size: 18px; padding: 15px 40px; border-radius: 8px; text-decoration: none; cursor: pointer; user-select: none; box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);">
        이메일 인증하기
    </a>
</div>
</body>
</html>
