server:
  port: 8080

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/postgres
    username: ${username}
    password: ${dbpassword}

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}  # 보내는 이메일
    password: ${MAIL_PASSWORD}  # 앱 비밀번호
    properties:
      mail:
       smtp:
        auth: true
        starttls:
          enable: true
        ssl:
          enable: false
    service:
      sender:
        host: smtp.gmail.com
        port: 587
        username: ${MAIL_USERNAME}
        password: ${MAIL_PASSWORD}
        ssl:
          enable: false

  # JPA & Hibernate 설정
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        show_sql: true # 실행되는 SQL 쿼리를 로그로 보여줍니다.
        format_sql: true # SQL 쿼리를 보기 좋게 정렬해줍니다.
        default_batch_fetch_size: 100 # N+1 문제 해결을 위한 옵션
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  # JWT 시크릿 키 (기존 설정)
  jwt:
    secret: 'ylWNT6xLqUg/K2pcfxlwumvsJ4UWRmF3SVh/wufsS2E='

  # OAuth2 Client
  security:
    oauth2:
      client:
        registration:
          google:
            client-name: Google
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: ${GOOGLE_REDIRECT_URI}
            authorization-grant-type: authorization_code
            scope:
              - profile
              - email
          kakao:
            client-name: Kakao
            client-authentication-method: client_secret_post
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: ${KAKAO_REDIRECT_URI}
            authorization-grant-type: authorization_code
            scope:
              - account_email
              - profile_nickname
          naver:
            client-name: Naver
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            redirect-uri: ${NAVER_REDIRECT_URI}
            authorization-grant-type: authorization_code
            scope:
              - email
              - profile
              - name
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

