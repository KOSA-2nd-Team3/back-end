name: Deploy To EC2

on:
  push:
    branches:
      - dev

jobs:
  Deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH로 EC2에 접속하기
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script_stop: true
          script: |
            cd /home/ubuntu/ottmoa_server
            git pull origin dev
            ./gradlew clean build
            sudo fuser -k -n tcp 8080 || true
            nohub java -jar build/libs/*SANPSHOT.jar > ./output.log 2>&1 &